<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AJcarparts{% endblock %}</title>
    
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #1e293b;
            --accent: #5173bc;
            --accent-hover: #5173bc;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --border: #e5e7eb;
            --success: #16a34a;
            --danger: #dc2626;
            --shadow: 0 10px 25px rgba(0,0,0,0.08);
            --radius: 18px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            color: var(--text);
        }

        .topbar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 14px 18px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .topbar-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand img {
            width: 44px;
            height: 44px;
            object-fit: contain;
            background: white;
            border-radius: 12px;
            padding: 4px;
        }

        .brand-text h1 {
            margin: 0;
            font-size: 22px;
        }

        .brand-text p {
            margin: 2px 0 0;
            font-size: 13px;
            color: #cbd5e1;
        }

        .page {
            width: 100%;
            max-width: 1100px;
            margin: 22px auto;
            padding: 0 14px 30px;
        }

        .btn {
            display: inline-block;
            padding: 10px 14px;
            border-radius: 10px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .btn-light {
            background: white;
            color: #111827;
            border: 1px solid #e5e7eb;
        }

        .user-box {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .username {
            font-size: 14px;
            font-weight: bold;
            color: #e2e8f0;
        }
        .background-logo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            width: 250px;
            opacity: 0.04;

            filter: grayscale(100%); /* 👈 עושה אותו אפור עדין */
            
            z-index: 0;
            pointer-events: none;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>
<img src="/static/logo.jpeg" alt="bg-logo" class="background-logo">

<div class="app-shell">

    <header class="topbar">
        <div class="topbar-inner">

            <!-- לוגו -->
            <div class="brand">
                <img src="/static/logo.jpeg" alt="לוגו">
                <div class="brand-text">
                    <h1>AJcarparts</h1>
                    <p>ניהול הזמנות, לקוחות ומלאי</p>
                </div>
            </div>

            <!-- צד ימין -->
            <div class="user-box">

                {% if request.user.is_authenticated %}
                    
                    <span class="username">
                        👋 {{ request.user.username }}
                    </span>

                    <a href="{% url 'home' %}" class="btn btn-light">
                        דף ראשי
                    </a>

                    <a href="/admin/" class="btn btn-light">
                        דף מנהל
                    </a>

                    <form method="post" action="{% url 'logout' %}" style="margin:0;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-light">
                            התנתק
                        </button>
                    </form>

                {% else %}

                    <a href="{% url 'login' %}" class="btn btn-light">
                        התחבר
                    </a>

                {% endif %}

            </div>

        </div>
    </header>

    <main class="page">
        {% block content %}{% endblock %}
    </main>

</div>

</body>
</html>
